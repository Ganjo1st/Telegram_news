name: Run Bots Schedule

on:
  schedule:
    # Задаем расписание в формате cron (UTC время)
    # Пример: каждый час в 5 минут (05:00, 06:00 и т.д.)
    - cron: '5 * * * *'
  workflow_dispatch: # Позволяет запускать вручную

jobs:
  run-bot1:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client
          # Если у вас есть requirements.txt, раскомментируйте следующую строку:
          # pip install -r requirements.txt

      - name: Run Bot 1
        env:
          BOT_NAME: 'bot1'
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python manager.py

  run-bot2:
    runs-on: ubuntu-latest
    needs: run-bot1 # Эта строчка заставит ботов выполняться по очереди, а не одновременно
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client
          # pip install -r requirements.txt

      - name: Run Bot 2
        env:
          BOT_NAME: 'bot2'
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python manager.py

  # Добавьте столько блоков, сколько у вас ботов, меняя bot1 на bot3, bot4 и т.д.
  # run-bot3:
  #   runs-on: ubuntu-latest
  #   needs: run-bot2
  #   steps:
  #     ... (аналогично)
