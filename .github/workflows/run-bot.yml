name: Run News Bot

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  run-news-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create bots directory
        run: mkdir -p bots
      
      - name: Run News Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          MIN_POST_INTERVAL: '2100'
          MAX_POST_INTERVAL: '7200'
          MAX_POSTS_PER_DAY: '24'
          TIMEZONE_OFFSET: '7'
          REQUEST_TIMEOUT: '15'
        run: python bots/news_bot.py
      
      - name: Commit and push state files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add state_news_bot.json posts_meta.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Update state [skip ci]" && git push)
