name: Run News Bot

on:
  schedule:
    # Каждый час в 15 минут (UTC)
    - cron: '15 * * * *'
  workflow_dispatch:

jobs:
  run-news-bot:
    runs-on: ubuntu-latest
    # Добавляем права на запись
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create bots directory
        run: |
          mkdir -p bots
          ls -la bots/
      
      - name: Run News Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          MIN_POST_INTERVAL: '2100'
          MAX_POST_INTERVAL: '7200'
          MAX_POSTS_PER_DAY: '24'
          TIMEZONE_OFFSET: '7'
          REQUEST_TIMEOUT: '15'
          TRANSLATION_TIMEOUT: '60'
          PUBLISH_TIMEOUT: '30'
          TOTAL_BOT_TIMEOUT: '240'
        run: python bots/news_bot.py
      
      - name: Commit and push state and meta files
        run: |
          # Настраиваем git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Добавляем файлы состояния и мета
          git add state_news_bot.json posts_meta.json
          
          # Проверяем, есть ли изменения
          if git diff --quiet && git diff --staged --quiet; then
            echo "✅ Нет изменений для коммита"
          else
            git commit -m "🤖 Update bot state and meta [skip ci]"
            
            # Пробуем запушить
            if git push; then
              echo "✅ Файлы состояния и мета успешно обновлены в репозитории"
            else
              echo "⚠️ Не удалось запушить, но файлы сохранены локально"
            fi
          fi
      
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs
          path: |
            *.log
            logs/
          retention-days: 7
