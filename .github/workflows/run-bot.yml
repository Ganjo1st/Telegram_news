name: Run News Bot

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

jobs:
  run-news-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create bots directory
        run: |
          mkdir -p bots
          ls -la bots/
      
      - name: Run News Bot Manager
        env:
          BOT_NAME: 'news_bot'
          BOT_SCRIPT: 'bots/news_bot.py'
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          MIN_POST_INTERVAL: '2100'
          MAX_POST_INTERVAL: '7200'
          MAX_POSTS_PER_DAY: '24'
          TIMEZONE_OFFSET: '7'
          REQUEST_TIMEOUT: '15'
          TRANSLATION_TIMEOUT: '60'
          PUBLISH_TIMEOUT: '30'
          BOT_TIMEOUT: '1800'
          MAX_RETRIES: '3'
          RETRY_DELAY: '5'
        run: python manager.py
