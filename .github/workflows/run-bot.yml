name: Run News Bot

on:
  schedule:
    # Каждый час в 15 минут (UTC)
    - cron: '15 * * * *'
  workflow_dispatch:

jobs:
  run-news-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # Нужно для коммита обратно
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create bots directory
        run: |
          mkdir -p bots
          ls -la bots/
      
      - name: Run News Bot
        env:
          # Telegram
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          
          # Настройки бота
          MIN_POST_INTERVAL: '2100'      # 35 минут
          MAX_POST_INTERVAL: '7200'      # 2 часа (можно изменить на 5400 для 1.5ч)
          MAX_POSTS_PER_DAY: '24'
          TIMEZONE_OFFSET: '7'
          REQUEST_TIMEOUT: '15'
          TRANSLATION_TIMEOUT: '60'
          PUBLISH_TIMEOUT: '30'
          TOTAL_BOT_TIMEOUT: '240'
          
        run: python bots/news_bot.py
      
      - name: Commit and push state file
        run: |
          # Настраиваем git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Проверяем, изменился ли файл состояния
          if [ -f "state_news_bot.json" ]; then
            git add state_news_bot.json
            git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Update bot state [skip ci]"
            git push
            echo "✅ Файл состояния обновлён в репозитории"
          else
            echo "⚠️ Файл состояния не найден"
          fi
      
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs
          path: |
            *.log
            logs/
          retention-days: 7
